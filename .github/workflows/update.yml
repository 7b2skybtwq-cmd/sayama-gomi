name: Update Quote0 image

on:
  schedule:
    # JST 00:07 = UTC 15:07。毎日、日付が変わった後に生成。
    - cron: '7 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Japanese font
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - run: pip install -r requirements.txt
      - run: python generate.py
      - name: Commit updated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.png
          git diff --cached --quiet || git commit -m "Update Quote0 image"
          git push
      - name: Send image to Quote/0
        env:
          QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
          QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          device_id = urllib.parse.quote(os.environ["QUOTE0_DEVICE_ID"], safe="")
          endpoint = f"https://dot.mindreset.tech/api/authV2/open/device/{device_id}/image"
          payload = {
              "refreshNow": True,
              "image": base64.b64encode(Path("index.png").read_bytes()).decode("ascii"),
              "border": 0,
              "ditherType": "NONE",
          }
          request = urllib.request.Request(
              endpoint,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {os.environ['QUOTE0_API_KEY']}",
                  "Content-Type": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=60) as response:
                  print(response.read().decode("utf-8"))
          except urllib.error.HTTPError as error:
              print(error.read().decode("utf-8", errors="replace"), file=sys.stderr)
              raise
          PY
