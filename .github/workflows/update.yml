name: Update Quote0 image

on:
  schedule:
    # JST 00:07 = UTC 15:07。毎日、日付が変わった後に生成。
    - cron: '7 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Japanese font
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - run: pip install -r requirements.txt
      - run: python generate.py
      - name: Commit updated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.png
          git diff --cached --quiet || git commit -m "Update Quote0 image"
          git push
      - name: Send image to Quote/0
        env:
          QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
          QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          retry_status_codes = {429, 502, 503, 504}
          retry_delays = [10, 30, 60, 120]
          device_id = urllib.parse.quote(os.environ["QUOTE0_DEVICE_ID"], safe="")
          endpoint = f"https://dot.mindreset.tech/api/authV2/open/device/{device_id}/image"
          payload = {
              "refreshNow": True,
              "image": base64.b64encode(Path("index.png").read_bytes()).decode("ascii"),
              "border": 0,
              "ditherType": "NONE",
          }
          request_body = json.dumps(payload).encode("utf-8")

          def send_image(label):
              request = urllib.request.Request(
                  endpoint,
                  data=request_body,
                  headers={
                      "Authorization": f"Bearer {os.environ['QUOTE0_API_KEY']}",
                      "Content-Type": "application/json",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(request, timeout=60) as response:
                      print(f"{label}: {response.read().decode('utf-8')}")
              except urllib.error.HTTPError as error:
                  detail = error.read().decode("utf-8", errors="replace")
                  print(f"{label} failed with HTTP {error.code}: {detail}", file=sys.stderr)
                  raise

          for attempt in range(len(retry_delays) + 1):
              try:
                  send_image(f"Dot API attempt {attempt + 1}")
                  break
              except urllib.error.HTTPError as error:
                  if error.code not in retry_status_codes:
                      raise
                  if attempt < len(retry_delays):
                      delay = retry_delays[attempt]
                      print(f"Retrying Dot API in {delay} seconds...", file=sys.stderr)
                      time.sleep(delay)
          else:
              print("All Dot API retries failed. Waiting 30 minutes for backup send.", file=sys.stderr)
              time.sleep(30 * 60)
              send_image("Dot API backup send")
          PY
